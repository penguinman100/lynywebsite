
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LYNY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LYNY — monochrome minimal.">
  <style>
    :root{
      --bg:#0a0a0a; --fg:#f2f2f2; --muted:#a0a0a0; --line:#151515;
      --btn:#ffffff; --btnTxt:#000000;
    }
    @media (prefers-color-scheme: light){
      :root{ --bg:#f7f7f7; --fg:#0a0a0a; --muted:#666; --line:#e8e8e8; --btn:#000; --btnTxt:#fff; }
    }

    html, body { height:100%; margin:0; }
    body{
      background:
        radial-gradient(1200px 700px at 50% -10%, #0e0e0e 0%, var(--bg) 60%),
        linear-gradient(to bottom, rgba(255,255,255,.02), transparent 30%);
      color:var(--fg);
      font: 15px/1.45 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      letter-spacing:.2px;
      display:grid; place-items:center;
      overflow:hidden;
    }

    / Subtle dimensional grid + lines (artistic but quiet) /
    .lines, .cuts { position:fixed; inset:0; pointer-events:none; }
    .lines{
      background:
        linear-gradient(to right, var(--line) 1px, transparent 1px) 0 0/64px 64px,
        linear-gradient(to bottom, var(--line) 1px, transparent 1px) 0 0/64px 64px;
      opacity:.12;
    }
    .cuts{
      background:
        linear-gradient(135deg, rgba(255,255,255,.06) 0 1px, transparent 1px) 0 0/180px 180px,
        linear-gradient(45deg, rgba(255,255,255,.04) 0 1px, transparent 1px) 0 0/140px 140px;
      opacity:.06;
    }

    main{
      position:relative; z-index:1;
      display:grid; place-items:center; gap:30px;
      padding:24px;
    }

    / Title — large, uppercase, split-line accent /
    h1{
      position:relative; margin:0;
      text-transform:uppercase; font-weight:800; letter-spacing:4px;
      font-size:clamp(48px, 11vw, 160px); line-height:.82;
      filter: drop-shadow(0 18px 22px rgba(0,0,0,.35));
      text-align:center;
    }
    h1::after{
      content:""; position:absolute; left:-4%; right:-4%; top:52%;
      height:1px;
      background:linear-gradient(90deg, transparent 0 8%, #fff 25% 75%, transparent 92% 100%);
      opacity:.85; transform: translateY(-1px);
    }

    / Center buttons cluster /
    .cta-wrap{
      display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
    }
    .cta{
      appearance:none; border:1px solid var(--fg); background:transparent; color:var(--fg);
      padding:12px 18px; text-transform:uppercase; letter-spacing:1.2px; font-size:12px;
      cursor: crosshair; position:relative; isolation:isolate;
    }
    .cta::before{ content:""; position:absolute; inset:0; border:1px solid rgba(255,255,255,.18); transform:translate(2px,2px); opacity:.6; }
    .cta:hover{ background:var(--btn); color:var(--btnTxt); letter-spacing:1.6px; }
    .cta:active{ transform: translateY(1px); }

    / Minimal footer with year, kept microscopic /
    footer{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); color:var(--muted); font-size:11px; letter-spacing:.6px; }

    / Motion polish (respect reduced motion) /
    @media (prefers-reduced-motion:no-preference){
      .cta{ transition: all .14s ease; }
      h1{ transition: letter-spacing .18s ease; }
      h1:hover{ letter-spacing:6px; }
      body{ transition: background .3s ease; }
    }

    / A11y /
    :focus-visible{ outline:1px dashed #fff; outline-offset:3px; }
  </style>
</head>
<body>
  <div class="lines" aria-hidden="true"></div>
  <div class="cuts" aria-hidden="true"></div>

  <main id="root">
    <h1 aria-label="LYNY">LYNY</h1>

    <div class="cta-wrap">
      <a class="cta" href="#stream">https://createmusic.fm/noisetodanceto</a>
      <a class="cta" href="#tour">https://linktr.ee/lyny</a>
      <a class="cta" href="https://noisetodanceto.shop">Shop</a>
    </div>
  </main>

  <footer>© <span id="y"></span> LYNY</footer>

  <script>
    // Year
    document.getElementById('y').textContent = new Date().getFullYear();

    // Smooth-scroll mapping for center buttons (kept minimal; targets can be added later)
    const map = { '#stream':'#', '#tour':'#', '#shop':'#' };
    document.querySelectorAll('.cta').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const h = e.currentTarget.getAttribute('href');
        const t = map[h];
        if (t && t !== '#'){ e.preventDefault(); document.querySelector(t)?.scrollIntoView({ behavior:'smooth' }); }
      });
    });
  </script>
</body>
</html>
